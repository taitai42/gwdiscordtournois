services:
  mysql:
    image: mysql:8.0
    container_name: gw-tournois-mysql
    restart: unless-stopped
    environment:
      - MYSQL_ROOT_PASSWORD=${MYSQL_ROOT_PASSWORD:-rootpass}
      - MYSQL_DATABASE=${DB_NAME:-gw_tournois}
      - MYSQL_USER=${DB_USER:-bot}
      - MYSQL_PASSWORD=${DB_PASSWORD:-botpass}
      - TZ=Europe/Paris
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-p${MYSQL_ROOT_PASSWORD:-rootpass}"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  bot:
    build: .
    container_name: gw-tournois-bot
    restart: unless-stopped
    depends_on:
      mysql:
        condition: service_healthy
    env_file:
      - .env
    environment:
      - NODE_ENV=production
      - TZ=Europe/Paris
      - DB_HOST=mysql
      - DB_PORT=3306
      - DB_USER=${DB_USER:-bot}
      - DB_PASSWORD=${DB_PASSWORD:-botpass}
      - DB_NAME=${DB_NAME:-gw_tournois}
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

volumes:
  mysql_data:
